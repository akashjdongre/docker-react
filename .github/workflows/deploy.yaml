
# ---- Workflow Name -----#

name: Deploy React App Frontend 

#---- When it runs -----#

on:
  push:
    branches:
      - master
#---- Jobs Section ------#

jobs:
  #---- Job Name -----#
  build:
    #---- Runs on a virtual machine provided by GitHub -----#
    runs-on: ubuntu-latest
    #---- What actually happens ----#
    #---- CI : Continuous Integration-----#
    steps:
      - uses: actions/checkout@v2
      - run: docker login -u ${{ secrets.DOCKER_USERNAME  }} -p ${{ secrets.DOCKER_PASSWORD }}
      - run: docker build -t react-app-img-dev -f dockerfile.dev .
      - run: docker run -e CI=true react-app-img-dev npm test

      - name: Generate deployment package and Push Docker Image
        run: zip -r deploy.zip . -x '*.git*'

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v18
        
        with:
          application_name: "react frontent"
          environment_name: Reactfrontent-env
          existing_bucket_name: elasticbeanstalk-eu-north-1-994878981390
          region: eu-north-1
          version_label: ${{ github.sha }}
          deployment_package: deploy.zip
          
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}