
# ---- Workflow Name -----#

name: Deploy React App Frontend 

#---- When it runs -----#

on:
  push:
    branches:
      - master
#---- Jobs Section ------#

jobs:
  #---- Job Name -----#
  build:
    #---- Runs on a virtual machine provided by GitHub -----#
    runs-on: ubuntu-latest
    #---- What actually happens ----#
    #---- CI : Continuous Integration-----#
    steps:

      - uses: actions/checkout@v3
      
      - run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - run: docker build -t akashjdongre/react-app-img-dev:latest -f dockerfile.dev .

      - run: docker push akashjdongre/react-app-img-dev:latest

      - name: Create Dockerrun file
        run: |
          cat > Dockerrun.aws.json << 'EOF'
          {
            "AWSEBDockerrunVersion": 1,
            "Image": {
              "Name": "akashjdongre/react-app-img-dev:latest",
              "Update": "true"
            },
            "Ports": [
              {
                "ContainerPort": 80
              }
            ]
          }
          EOF
      
      - name: Debug Dockerrun
        run: |
          cat Dockerrun.aws.json
          file Dockerrun.aws.json

      # Zip only Docker config
      - name: Zip deployment package
        run: zip -r deploy.zip Dockerrun.aws.json

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v18
        
        with:
          application_name: "react frontent"
          environment_name: Reactfrontent-env
          existing_bucket_name: elasticbeanstalk-eu-north-1-994878981390
          region: eu-north-1
          version_label: ${{ github.sha }}
          deployment_package: deploy.zip
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}